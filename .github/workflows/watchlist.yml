name: Daily Stock Watchlist

on:
  schedule:
    # 04:30 UTC = 05:30 BST (summer). GitHub cron can drift 5-15 min,
    # so this buffer targets inbox delivery by ~6am UK time.
    # NOTE: after UK clocks change in late Oct, switch to '30 5 * * 1-5'
    # to keep 5:30am GMT, or leave as-is for a 4:30am GMT run.
    - cron: '30 4 * * 1-5'
  workflow_dispatch: {}   # manual "Run workflow" button for testing

jobs:
  watchlist:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p output
          claude -p "Read SKILL.md in the repo root and follow it exactly to produce today's stock watchlist. Today's date: $(date -u '+%A %d %B %Y'). Write the four output files it specifies." \
            --dangerously-skip-permissions \
            --max-turns 60

      - name: Verify outputs exist
        run: |
          for f in output/subject.txt output/email.txt output/email.html output/teaser.txt; do
            if [ ! -s "$f" ]; then
              echo "::error::Missing or empty $f — aborting before delivery"
